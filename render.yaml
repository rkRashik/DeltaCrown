# render.yaml — Render.com Blueprint for DeltaCrown
# Docs: https://docs.render.com/blueprint-spec
#
# CRITICAL: This runs Daphne (ASGI) NOT gunicorn (WSGI).
# Daphne serves both HTTP and WebSocket on the same port.

services:
  - type: web
    name: deltacrown
    runtime: python
    region: singapore    # closest to SEA user base
    plan: starter
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
    startCommand: bash start.sh
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.10"
      - key: DJANGO_SETTINGS_MODULE
        value: deltacrown.settings
      - key: DEBUG
        value: "0"
      # Database — Neon PostgreSQL (set in Render dashboard)
      - key: DATABASE_URL
        fromDatabase:
          name: deltacrown-db
          property: connectionString
      # Supabase pooler fallback controls (optional):
      # - Keep SUPABASE_POOLER_PORT_FALLBACK=1 to auto-try :5432 when :6543 times out.
      # - Set SUPABASE_DIRECT_DATABASE_URL to a direct/db host URL if pooler host is unreachable.
      - key: SUPABASE_POOLER_PORT_FALLBACK
        value: "1"
      - key: SUPABASE_PREFER_DIRECT_CONNECTION
        value: "1"
      - key: DB_MIGRATION_MAX_ATTEMPTS
        value: "3"
      - key: SUPABASE_DIRECT_DATABASE_URL
        sync: false
      # Redis — Upstash (set in Render dashboard as REDIS_URL)
      # Used by: CHANNEL_LAYERS, Celery broker, Cache
      - key: REDIS_URL
        sync: false
      # Security
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "deltacrown.xyz,.deltacrown.xyz,.onrender.com"
      # Celery Beat — set to "1" to enable heavy periodic tasks
      # Leave unset or "0" on Free/Starter tier to save memory
      - key: ENABLE_CELERY_BEAT
        value: "0"
      # Lifecycle cron secret — used by external cron service (cron-job.org)
      # to authenticate POST /api/lifecycle/cron/ requests
      - key: CRON_SECRET
        generateValue: true
      # Startup process controls (safe defaults for Starter/free-tier)
      # NOTE: ENABLE_CELERY_WORKER is referenced here for documentation.
      # The Celery worker runs as a SEPARATE Render worker service.
      # Start command for that service: bash bin/start_worker.sh
      # Worker env vars to set in Render dashboard:
      #   CELERY_MAX_TASKS_PER_CHILD=50
      #   CELERY_MAX_MEMORY_PER_CHILD=150000
      - key: ENABLE_CELERY_WORKER
        value: "1"
      - key: ENABLE_DISCORD_BOT
        value: "0"
      - key: ENABLE_MIGRATIONS_ON_START
        value: "1"
      - key: DAPHNE_ACCESS_LOG
        value: "0"
      - key: WS_RATE_ENABLED
        value: "1"
      # HTTP keep-alive / long-poll timeout (seconds).
      # 3600 (1 hour) is sufficient for normal page loads, API calls, and
      # lifecycle cron.  SSE is disabled by default (NOTIFICATIONS_SSE_ENABLED=0)
      # so 24-hour connections are not needed.  Set to 86400 only if you
      # explicitly enable SSE and need very long-lived event streams.
      - key: DAPHNE_HTTP_TIMEOUT
        value: "3600"
      # Keep embedded server/access logs quieter by default
      - key: DJANGO_SERVER_LOG_LEVEL
        value: "WARNING"
    healthCheckPath: /healthz/
    autoDeploy: false
