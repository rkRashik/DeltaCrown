<div id="dc-mobile-notif-overlay" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[170] hidden opacity-0 transition-opacity duration-300"></div>
<div id="dc-mobile-notif-sheet" class="fixed bottom-0 left-0 right-0 h-[85vh] dc-mobile-sheet rounded-t-3xl z-[171] transform translate-y-full transition-transform duration-300 flex flex-col md:hidden">
  <div class="w-full pt-3 pb-2 flex justify-center cursor-pointer" id="dc-mobile-notif-handle"><div class="w-12 h-1.5 bg-white/20 rounded-full"></div></div>
  <div class="px-5 pb-4 border-b border-white/10">
    <div class="flex justify-between items-center mb-4">
      <h3 class="font-display font-extrabold text-2xl text-white tracking-wide">Notifications</h3>
      <button id="dc-mobile-notif-close" class="p-2 rounded-full bg-white/5 text-slate-400 hover:text-white"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="flex p-1 bg-black/40 rounded-xl border border-white/5 relative" id="dc-mobile-segments">
      <div class="dc-segment-active-bg" id="dc-mobile-segment-highlighter" style="width: 33.33%; transform: translateX(0);"></div>
      <button class="dc-mobile-segment-btn flex-1 text-sm font-semibold py-2 rounded-lg text-white transition relative z-10" data-index="0" data-filter="ALL">All</button>
      <button class="dc-mobile-segment-btn flex-1 text-sm font-semibold py-2 rounded-lg text-slate-400 transition relative z-10" data-index="1" data-filter="UNREAD">Unread</button>
      <button class="dc-mobile-segment-btn flex-1 text-sm font-semibold py-2 rounded-lg text-slate-400 transition relative z-10" data-index="2" data-filter="TEAM">Invites</button>
    </div>
  </div>
  <div id="dc-mobile-notif-content" class="flex-1 overflow-y-auto pb-6 px-2"></div>
</div>
