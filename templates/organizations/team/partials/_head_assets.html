{# HEAD ASSETS — Tailwind CDN, Fonts, CSS Variables, Full Style System #}
{# Rebuilt from Demo_Team_detail_templete.html — pixel-perfect parity #}
{% load static %}

<meta name="color-scheme" content="dark" />

<script src="https://unpkg.com/lucide@latest"></script>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;800;900&family=Space+Grotesk:wght@500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />

<style>
  :root {
    --team-primary: {{ team.primary_color|default:"#3B82F6" }};
    --team-accent: {{ team.accent_color|default:"#10B981" }};
    --team-dim: color-mix(in srgb, {{ team.primary_color|default:"#3B82F6" }} 14%, transparent);
    --team-glow: color-mix(in srgb, {{ team.primary_color|default:"#3B82F6" }} 26%, transparent);
    --team-btn-fg: #000000;
    --team-color-rgb: 59, 130, 246;
    --team-action: #22D3EE;
    --team-action-rgb: 34, 211, 238;
    --team-action-fg: #020204;
    --team-action-border: rgba(34, 211, 238, 0.42);
    --team-action-soft: rgba(34, 211, 238, 0.12);
    --team-action-glow: rgba(34, 211, 238, 0.26);
    --bg-base: #020204;
    --glass-bg: rgba(10, 10, 15, 0.6);
    --glass-brd: rgba(255, 255, 255, 0.12);
    --ring-soft: rgba(255, 255, 255, 0.08);
  }

  body[data-theme="VIOLATION"] { --team-primary: #6C00FF; --team-dim: rgba(108, 0, 255, 0.16); --team-glow: rgba(108, 0, 255, 0.26); }
  body[data-theme="CYBER"]     { --team-primary: #00E5FF; --team-dim: rgba(0, 229, 255, 0.16); --team-glow: rgba(0, 229, 255, 0.26); }
  body[data-theme="CRIMSON"]   { --team-primary: #FF3131; --team-dim: rgba(255, 49, 49, 0.16); --team-glow: rgba(255, 49, 49, 0.26); }
  body[data-theme="EMERALD"]   { --team-primary: #00FF41; --team-dim: rgba(0, 255, 65, 0.16); --team-glow: rgba(0, 255, 65, 0.26); }
  body[data-custom-colors="true"] {
    --team-primary: {{ team.primary_color|default:"#3B82F6" }};
    --team-dim: color-mix(in srgb, {{ team.primary_color|default:"#3B82F6" }} 14%, transparent);
    --team-glow: color-mix(in srgb, {{ team.primary_color|default:"#3B82F6" }} 26%, transparent);
  }

  html, body { height: 100%; }
  body { background: var(--bg-base); color: #E2E8F0; overflow-x: hidden; }
  img, video { max-width: 100%; }

  /* Banner fade — dissolves into body bg */
  .fade-bottom {
    background: linear-gradient(to top, var(--bg-base) 0%, rgba(2,2,4,0.98) 15%, rgba(2,2,4,0.6) 50%, transparent 100%);
  }

  /* Glass */
  .liquid-glass {
    background: var(--glass-bg);
    backdrop-filter: blur(20px) saturate(140%);
    -webkit-backdrop-filter: blur(20px) saturate(140%);
    border: 1px solid var(--glass-brd);
    box-shadow: 0 20px 40px rgba(0,0,0,0.6);
  }
  .liquid-trace {
    transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .liquid-trace:hover {
    border-color: var(--team-primary);
    box-shadow: 0 0 30px var(--team-glow);
    transform: translateY(-2px);
  }

  /* Section Accents */
  [data-accent="team"]    { border-top: 2px solid var(--team-primary); }
  [data-accent="success"] { border-top: 2px solid #00FF41; }
  [data-accent="electric"]{ border-top: 2px solid #00E5FF; }
  [data-accent="danger"]  { border-top: 2px solid #FF3131; }

  /* Role/Game visibility */
  .role-public-only, .role-member-only, .role-staff-only, .role-owner-only { display: none !important; }
  body[data-role="PUBLIC"] .role-public-only { display: flex !important; }
  body[data-role="MEMBER"] .role-member-only { display: flex !important; }
  body[data-role="MANAGER"] .role-staff-only { display: flex !important; }
  body[data-role="COACH"] .role-staff-only   { display: flex !important; }
  body[data-role="OWNER"]  .role-owner-only  { display: flex !important; }
  body[data-role="OWNER"]  .role-staff-only  { display: flex !important; }

  /* Game-type visibility */
  .game-fps-only, .game-moba-only, .game-sports-only,
  .game-br-only, .game-fighting-only, .game-strategy-only,
  .game-ccg-only, .game-other-only { display: none !important; }
  body[data-game-type="FPS"] .game-fps-only { display: flex !important; }
  body[data-game-type="MOBA"] .game-moba-only { display: flex !important; }
  body[data-game-type="SPORTS"] .game-sports-only { display: flex !important; }
  body[data-game-type="BR"] .game-br-only { display: flex !important; }
  body[data-game-type="FIGHTING"] .game-fighting-only { display: flex !important; }
  body[data-game-type="STRATEGY"] .game-strategy-only { display: flex !important; }
  body[data-game-type="CCG"] .game-ccg-only { display: flex !important; }
  body[data-game-type="OTHER"] .game-other-only { display: flex !important; }

  /* Hero image mask */
  .hero-mask { mask-image: linear-gradient(to bottom, black 70%, transparent 100%); }

  /* Immersive Hub — Gaming font */
  .font-gaming { font-family: 'Outfit', sans-serif; }

  /* Ambient Team Glow */
  .ambient-glow {
    position: absolute;
    width: min(760px, 88vw);
    height: 420px;
    background: radial-gradient(ellipse at center, rgba(var(--team-color-rgb), 0.14) 0%, transparent 68%);
    filter: blur(60px);
    z-index: 10;
    bottom: -90px;
    left: clamp(1rem, 6vw, 5rem);
    pointer-events: none;
  }

  /* Premium Glass Panel */
  .glass-panel {
    background: rgba(255, 255, 255, 0.03);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
  }

  /* Avatar Ring System */
  .avatar-ring {
    position: relative;
    border-radius: 1.5rem;
    padding: 4px;
    background: linear-gradient(135deg, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0.05) 100%);
    box-shadow: 0 0 40px rgba(var(--team-color-rgb), 0.4), inset 0 0 20px rgba(255,255,255,0.1);
  }
  .avatar-inner {
    border-radius: 1.25rem;
    overflow: hidden;
    background: #000;
    border: 1px solid rgba(0,0,0,0.5);
  }

  /* Follow Button */
  .btn-follow {
    background:
      linear-gradient(135deg, rgba(var(--team-action-rgb), 0.16), rgba(139, 92, 246, 0.12)),
      rgba(15, 23, 42, 0.78);
    border: 1px solid var(--team-action-border);
    color: #e0f7ff !important;
    box-shadow: 0 16px 42px -24px var(--team-action-glow), inset 0 1px 0 rgba(255,255,255,0.14);
    transition: all 0.3s ease;
  }
  .btn-follow:hover {
    background:
      linear-gradient(135deg, rgba(var(--team-action-rgb), 0.24), rgba(139, 92, 246, 0.16)),
      rgba(15, 23, 42, 0.88);
    border-color: rgba(var(--team-action-rgb), 0.72);
    box-shadow: 0 20px 50px -22px var(--team-action-glow), inset 0 1px 0 rgba(255,255,255,0.2);
  }

  /* Modal animation */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(16px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Tab System */
  .dc-tab-btn {
    position: relative;
    color: #9ca3af;
    transition: color 0.3s ease;
  }
  .dc-tab-btn:hover { color: #ffffff; }
  .dc-tab-active { color: #ffffff !important; font-weight: 600; }
  .dc-tab-active::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 0;
    right: 0;
    height: 2px;
    background: var(--team-primary);
    box-shadow: 0 0 8px rgba(var(--team-color-rgb), 0.6), 0 0 20px rgba(var(--team-color-rgb), 0.3);
    border-radius: 1px;
  }

  /* Chip */
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px; border-radius: 999px;
    font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    font-family: "JetBrains Mono", monospace;
    color: #cbd5e1; user-select: none; white-space: nowrap;
  }
  .chip.primary {
    background: color-mix(in srgb, var(--team-primary) 15%, transparent);
    border-color: color-mix(in srgb, var(--team-primary) 40%, transparent);
    color: var(--team-primary);
  }

  /* Clamp */
  .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

  /* Tooltip */
  .has-tooltip { position: relative; cursor: help; }
  .has-tooltip:hover::after {
    content: attr(data-tooltip);
    position: absolute; bottom: 100%; left: 50%;
    transform: translateX(-50%) translateY(-8px);
    background: #000;
    border: 1px solid rgba(255,255,255,0.2);
    color: white;
    font-size: 10px;
    padding: 4px 8px;
    border-radius: 6px;
    white-space: nowrap;
    z-index: 50;
    pointer-events: none;
    box-shadow: 0 4px 10px rgba(0,0,0,0.5);
  }

  /* Skeleton Loaders */
  .skeleton {
    position: relative; overflow: hidden;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
  }
  .skeleton::before {
    content: ""; position: absolute; inset: -50% -50%;
    transform: translateX(-60%) skewX(-12deg);
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.12) 50%, transparent 100%);
    animation: shimmer 2.2s linear infinite;
  }
  .skeleton-text {
    height: 1em; background: rgba(255,255,255,0.06); border-radius: 4px; margin: 0.5em 0;
  }
  .skeleton-card {
    background: rgba(10, 10, 15, 0.6); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px; padding: 1.5rem;
  }

  /* Empty States */
  .empty-state {
    padding: 3rem 1.5rem; text-align: center;
    border: 2px dashed rgba(255,255,255,0.1);
    border-radius: 16px; background: rgba(255,255,255,0.02);
  }
  .empty-state__icon { width: 64px; height: 64px; margin: 0 auto 1rem; opacity: 0.3; }

  /* Transitions */
  .transition-smooth { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
  .transition-transform { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
  .hover-lift { transition: transform 0.3s ease, box-shadow 0.3s ease; }
  .hover-lift:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(0,0,0,0.4), 0 0 20px var(--team-glow); }
  .hover-glow { transition: box-shadow 0.3s ease, border-color 0.3s ease; }
  .hover-glow:hover { box-shadow: 0 0 30px var(--team-glow), inset 0 0 20px rgba(255,255,255,0.05); border-color: var(--team-primary); }

  /* Smart Dynamic Grid */
  .dynamic-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1.5rem; grid-auto-flow: dense;
  }
  .dynamic-grid-item { grid-column: span 1; }
  .dynamic-grid-item--wide { grid-column: span 2; }
  @media (max-width: 768px) {
    .dynamic-grid { grid-template-columns: 1fr; }
    .dynamic-grid-item--wide { grid-column: span 1; }
  }

  /* Lazy Loading */
  .lazy-media { filter: blur(10px); transition: filter 0.5s ease; }
  .lazy-media.loaded { filter: blur(0); }
  .lazy-placeholder {
    background: linear-gradient(135deg, rgba(255,255,255,0.02) 0%, rgba(255,255,255,0.08) 100%);
    position: relative;
  }

  /* Fade-in */
  @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  .animate-fade-in-up { animation: fadeInUp 0.6s ease-out forwards; }
  .delay-100 { animation-delay: 0.1s; }
  .delay-200 { animation-delay: 0.2s; }
  .delay-300 { animation-delay: 0.3s; }

  /* Reduced motion */
  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; scroll-behavior: auto !important; }
  }

  .safe-pad { padding-bottom: max(16px, env(safe-area-inset-bottom)); }
  :focus-visible { outline: 2px solid var(--team-primary); outline-offset: 3px; border-radius: 10px; }

  section, #trophies, #public-scrims { scroll-margin-top: 96px; }
  .dc-team-detail-main { padding-bottom: max(6rem, calc(6rem + env(safe-area-inset-bottom))); }
  .dc-team-name { overflow-wrap: anywhere; }
  .dc-bench-label.hidden { display: none !important; }

  @media (max-width: 768px) {
    .dc-hero-banner { object-position: center top; }
    .dc-team-detail-main { padding-bottom: max(8.5rem, calc(8.5rem + env(safe-area-inset-bottom))); }
    #team-info-actions { width: 100%; }
  }

  @media (max-width: 640px) {
    .dc-team-title {
      flex-direction: column;
      align-items: center;
      line-height: 0.95;
    }
    .dc-team-tag {
      font-size: 1rem;
      line-height: 1.2;
      max-width: 100%;
    }
  }

  /* Team Card */
  .team-card {
    border: 1px solid rgba(255,255,255,0.10);
    box-shadow: 0 40px 90px rgba(0,0,0,0.70);
    background: radial-gradient(1200px 320px at 18% 35%, color-mix(in srgb, var(--team-primary) 16%, transparent) 0%, transparent 55%),
                linear-gradient(180deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.02) 100%);
  }

  /* Logo slab */
  .logo-slab {
    width: 180px; height: 180px; border-radius: 2.25rem;
    background: rgba(10,10,15,0.55); border: 1px solid rgba(255,255,255,0.10);
    box-shadow: inset 0 0 0 4px rgba(0,0,0,0.35), 0 30px 70px rgba(0,0,0,0.65);
    padding: 0; overflow: hidden;
  }
  .logo-slab__inner {
    width: 100%; height: 100%; border-radius: 2.25rem;
    background: radial-gradient(420px 320px at 30% 25%, color-mix(in srgb, var(--team-primary) 20%, transparent) 0%, transparent 55%),
                linear-gradient(180deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.55) 100%);
    border: none;
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  .logo-slab__inner::after {
    content:""; position:absolute; inset:-60%;
    background: radial-gradient(circle, rgba(255,255,255,0.06) 0%, transparent 55%);
    transform: translate(30%, 20%); pointer-events:none;
  }

  /* Verified dot */
  .verified-dot {
    width: 42px; height: 42px; border-radius: 999px;
    background: var(--team-primary); color: var(--team-btn-fg, #000);
    border: 6px solid rgba(0,0,0,0.85);
    box-shadow: 0 0 22px var(--team-glow);
  }

  /* Tag system */
  .tag {
    display: inline-flex; align-items: center; gap: 8px;
    height: 30px; padding: 0 12px; border-radius: 999px;
    font-family: "JetBrains Mono", monospace;
    font-size: 11px; font-weight: 800; letter-spacing: 0.10em; text-transform: uppercase;
    user-select: none; white-space: nowrap;
  }
  .tag--rank {
    background: color-mix(in srgb, var(--team-primary) 18%, transparent);
    border: 1px solid color-mix(in srgb, var(--team-primary) 40%, transparent);
    color: color-mix(in srgb, var(--team-primary) 85%, white 15%);
  }
  .tag--neutral {
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.10);
    color: rgba(255,255,255,0.72);
  }
  .tag--recruit {
    background: transparent;
    border: 1px solid color-mix(in srgb, var(--team-primary) 45%, transparent);
    color: var(--team-primary);
    box-shadow: 0 0 0 1px rgba(0,0,0,0.35) inset;
  }

  /* Meta pill */
  .meta-pill {
    display: inline-flex; align-items: center; gap: 10px;
    height: 32px; padding: 0 12px; border-radius: 999px;
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.75);
    font-family: "JetBrains Mono", monospace;
    font-size: 11px; letter-spacing: 0.06em;
  }
  .meta-pill b { color: rgba(255,255,255,0.95); font-weight: 800; }

  /* Single-line title */
  .one-line-title { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  @media (max-width: 640px) {
    .logo-slab { width: 150px; height: 150px; border-radius: 2rem; }
    .logo-slab__inner { border-radius: 1.6rem; }
  }

  /* Team detail polish layer */
  .dc-page-atmosphere {
    background:
      linear-gradient(180deg, color-mix(in srgb, var(--team-primary) 10%, transparent) 0%, transparent 58%),
      linear-gradient(110deg, rgba(0,229,255,0.055) 0%, transparent 42%, rgba(124,58,237,0.05) 100%);
  }
  .dc-panel {
    background: linear-gradient(180deg, rgba(255,255,255,0.045), rgba(255,255,255,0.018)), rgba(5,7,12,0.78);
    border: 1px solid rgba(255,255,255,0.09);
    box-shadow: 0 24px 70px rgba(0,0,0,0.36);
  }
  .dc-hero-shell { padding-top: clamp(15rem, 22vw, 21.25rem); padding-bottom: clamp(1.75rem, 4vw, 2.75rem); }
  .dc-hero-layout { align-items: flex-end; }
  .dc-hero-logo { filter: drop-shadow(0 20px 42px rgba(0,0,0,0.55)); }
  .dc-badges-row > * { min-height: 28px; border-radius: 999px; letter-spacing: 0.09em; }
  .dc-hero-title { max-width: min(100%, 850px); letter-spacing: 0; }
  .dc-hero-side { width: min(100%, 430px); }
  .dc-hero-stats {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    width: min(100%, 430px);
    overflow: hidden;
  }
  .dc-hero-stats > div { min-width: 0; }
  .dc-action-zone { row-gap: .75rem; }
  .dc-action-social { row-gap: .5rem; }
  .dc-action-btn,
  .dc-action-icon {
    min-height: 44px;
    cursor: pointer;
    align-items: center;
    justify-content: center;
  }
  .dc-tab-btn { cursor: pointer; }
  .dc-action-ghost {
    background: rgba(255,255,255,0.045);
    border: 1px solid rgba(255,255,255,0.10);
  }
  .dc-action-success {
    background: rgba(16,185,129,0.92);
    color: #020204;
    border: 1px solid rgba(110,231,183,0.35);
    box-shadow: 0 14px 32px -22px rgba(16,185,129,0.75);
  }
  .dc-action-staff {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(148,163,184,0.18);
    color: rgba(226,232,240,0.88);
    box-shadow: none;
  }
  .dc-action-staff:hover,
  .dc-action-ghost:hover {
    background: rgba(255,255,255,0.08);
    border-color: rgba(255,255,255,0.18);
  }
  .dc-action-staff-strong {
    color: color-mix(in srgb, var(--team-primary) 74%, white 26%);
    border-color: color-mix(in srgb, var(--team-primary) 22%, transparent);
  }
  .dc-recruiting-action {
    min-height: 44px;
    cursor: pointer;
    background: linear-gradient(135deg, rgba(16,185,129,0.96), rgba(52,211,153,0.84));
    border: 1px solid rgba(110,231,183,0.44);
    color: #020204 !important;
    box-shadow: 0 18px 44px -26px rgba(16,185,129,0.78), inset 0 1px 0 rgba(255,255,255,0.28);
  }
  .dc-recruiting-action:hover {
    background: linear-gradient(135deg, rgba(52,211,153,0.96), rgba(110,231,183,0.86));
    border-color: rgba(167,243,208,0.64);
    transform: translateY(-1px);
  }
  .dc-action-status {
    min-height: 44px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.10);
  }
  .dc-tabbar {
    position: relative;
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
  }
  .dc-tabs-scroll { overscroll-behavior-inline: contain; }
  .dc-main-stack { gap: clamp(2rem, 3vw, 3.25rem); }
  .dc-roster-grid { max-width: 100%; }
  .dc-roster-card {
    contain: layout paint;
    min-height: 320px;
    background: linear-gradient(180deg, rgba(255,255,255,0.035), rgba(255,255,255,0.01)), #07080d;
  }
  .dc-roster-card:focus-visible {
    outline: 2px solid color-mix(in srgb, var(--team-primary) 75%, white 25%);
    outline-offset: 3px;
  }
  .dc-roster-media { object-position: center 18%; }
  .dc-roster-card::after {
    content: "";
    position: absolute;
    inset: auto 0 0 0;
    height: 45%;
    background: linear-gradient(to top, rgba(0,0,0,0.92), transparent);
    pointer-events: none;
  }
  .dc-captain-badge,
  .dc-roster-slot-badge {
    border-radius: 999px;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }
  .dc-roster-body { z-index: 1; }
  .dc-roster-name {
    overflow-wrap: anywhere;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .dc-roster-username {
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .dc-roster-reveal {
    opacity: 0;
    transform: translateY(12px);
    visibility: hidden;
    pointer-events: none;
    transition: opacity .24s ease, transform .24s ease, visibility 0s linear .24s;
  }
  .dc-roster-card:hover .dc-roster-reveal,
  .dc-roster-card:focus-visible .dc-roster-reveal,
  .dc-roster-card:focus-within .dc-roster-reveal {
    opacity: 1;
    transform: translateY(0);
    visibility: visible;

<style nonce="{{ request.csp_nonce }}">

  .dc-page-atmosphere {

      transparent 55%) !important;

  /* Glass panel — shadow was 0 20px 40px (way too much for a button/stat card) */
  .glass-panel {

  /* ── ANIMATION SYSTEM ──────────────────────────────────────────────────── */
  :root {
    --ease-out-quart: cubic-bezier(0.25, 1, 0.5, 1);

  /* Hero entrance keyframes */
  @keyframes dcHeroScale {
    from { opacity: 0; transform: scale(0.88); }

  }
  @keyframes dcHeroRise {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Staggered hero sequence */
  .dc-hero-logo .avatar-ring      { animation: dcHeroScale 580ms var(--ease-out-expo)  0ms   both; }
  .dc-badges-row                  { animation: dcHeroRise  440ms var(--ease-out-quart) 110ms both; }
  .dc-hero-title                  { animation: dcHeroRise  560ms var(--ease-out-expo)  170ms both; }
  #dc-team-motto                  { animation: dcHeroRise  380ms var(--ease-out-quart) 260ms both; }
  .dc-hero-stats                  { animation: dcHeroRise  440ms var(--ease-out-quart) 210ms both; }
  .dc-action-zone                 { animation: dcHeroRise  380ms var(--ease-out-quart) 290ms both; }

  /* Roster card stagger — index set via style="--i: N" on each card */
  @keyframes dcRosterEnter {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .dc-roster-card {
    animation: dcRosterEnter 380ms var(--ease-out-quart) calc(var(--i, 0) * 55ms) both;
  }

  /* Tab sliding indicator — real DOM element positioned by JS */
  .dc-tab-indicator {
    position: absolute;
    bottom: -1px;
    height: 2px;
    background: var(--team-primary);
    box-shadow: 0 0 8px var(--team-glow);
    border-radius: 1px;
    transition: left 230ms var(--ease-out-expo), width 230ms var(--ease-out-expo);
    pointer-events: none;
    will-change: left, width;
  }

  /* Roster toggle chevron rotation */
  #dc-roster-toggle svg:last-child,
  #dc-roster-toggle > svg {
    transition: transform 250ms var(--ease-out-quart);
  }
  #dc-roster-toggle[aria-expanded="true"] svg {
    transform: rotate(180deg);
  }

  /* Scroll reveal system — JS adds .dc-reveal-set, then .dc-in when visible */
  .dc-reveal-set {
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 420ms var(--ease-out-quart), transform 420ms var(--ease-out-quart);
  }
  .dc-reveal-set.dc-in {
    opacity: 1;
    transform: translateY(0);
  }

  /* Match history cards — individual reveal stagger via JS-set --i */
  .dc-match-history-card.dc-reveal-set {
    transition-delay: calc(var(--i, 0) * 45ms);
  }

  /* Reduced motion: disable all custom animations */
  @media (prefers-reduced-motion: reduce) {
    .dc-hero-logo .avatar-ring,
    .dc-badges-row, .dc-hero-title, #dc-team-motto,
    .dc-hero-stats, .dc-action-zone, .dc-roster-card {
      animation: none !important;
    }
    .dc-reveal-set {
      opacity: 1 !important; transform: none !important; transition: none !important;
    }
    .dc-tab-indicator { transition: none !important; }
  }
</style>

{# ── Smart Color System — auto-adjust dark team colors for visibility ──── #}
<script nonce="{{ request.csp_nonce }}">
(function() {
  var raw = '{{ team.primary_color|default:"#3B82F6" }}';

  function hexToRgb(hex) {
    hex = hex.replace('#', '');
    if (hex.length === 3) hex = hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
    var n = parseInt(hex, 16);
    return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
  }

  function luminance(r, g, b) {
    var a = [r, g, b].map(function(c) {
      c /= 255;
      return c <= 0.03928 ? c / 12.92 : Math.pow((c + 0.055) / 1.055, 2.4);
    });
    return 0.2126 * a[0] + 0.7152 * a[1] + 0.0722 * a[2];
  }

  function rgbToHsl(r, g, b) {
    r /= 255; g /= 255; b /= 255;
    var max = Math.max(r, g, b), min = Math.min(r, g, b);
    var h, s, l = (max + min) / 2;
    if (max === min) { h = s = 0; }
    else {
      var d = max - min;
      s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
      if (max === r) h = ((g - b) / d + (g < b ? 6 : 0)) / 6;
      else if (max === g) h = ((b - r) / d + 2) / 6;
      else h = ((r - g) / d + 4) / 6;
    }
    return [h * 360, s * 100, l * 100];
  }

  function hslToHex(h, s, l) {
    s /= 100; l /= 100;
    var a = s * Math.min(l, 1 - l);
    function f(n) {
      var k = (n + h / 30) % 12;
      var color = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
      return Math.round(255 * color).toString(16).padStart(2, '0');
    }
    return '#' + f(0) + f(8) + f(4);
  }

  var rgb = hexToRgb(raw);
  var lum = luminance(rgb[0], rgb[1], rgb[2]);
  var rawHsl = rgbToHsl(rgb[0], rgb[1], rgb[2]);
  var isRedAccent = rawHsl[1] >= 35 && (rawHsl[0] <= 25 || rawHsl[0] >= 345);
  var css = '';

  if (isRedAccent) {
    /* Red is reserved for danger/loss. Use cyan for general UI affordances. */
    var safeUi = '#22D3EE';
    var safeUiRgb = hexToRgb(safeUi);
    css += ':root, body, body[data-theme="CRIMSON"], body[data-custom-colors="true"] {\n';
    css += '  --team-primary: ' + safeUi + ';\n';
    css += '  --team-color-rgb: ' + safeUiRgb[0] + ', ' + safeUiRgb[1] + ', ' + safeUiRgb[2] + ';\n';
    css += '  --team-dim: color-mix(in srgb, ' + safeUi + ' 14%, transparent);\n';
    css += '  --team-glow: color-mix(in srgb, ' + safeUi + ' 24%, transparent);\n';
    css += '  --team-btn-fg: #020204;\n';
    css += '  --team-primary-raw: ' + raw + ';\n';
    css += '}\n';
    document.documentElement.dataset.semanticRedTeam = 'true';
  } else if (lum < 0.12) {
    /* Color too dark — lighten it so text/icons/accents are visible on #000 bg */
    var hsl = rgbToHsl(rgb[0], rgb[1], rgb[2]);
    var h = hsl[0], s = hsl[1], l = hsl[2];
    /* Achromatic / near-black: give it a cool blue-violet to look intentional */
    if (s < 12) { h = 220; s = 50; }
    var safeColor = hslToHex(h, Math.max(s, 40), Math.max(l, 52));
    var safeRgb = hexToRgb(safeColor);
    css += ':root, body, body[data-custom-colors="true"] {\n';
    css += '  --team-primary: ' + safeColor + ';\n';
    css += '  --team-color-rgb: ' + safeRgb[0] + ', ' + safeRgb[1] + ', ' + safeRgb[2] + ';\n';
    css += '  --team-dim: color-mix(in srgb, ' + safeColor + ' 18%, transparent);\n';
    css += '  --team-glow: color-mix(in srgb, ' + safeColor + ' 30%, transparent);\n';
    css += '  --team-btn-fg: #ffffff;\n';
    css += '  --team-primary-raw: ' + raw + ';\n';
    css += '}\n';
    document.documentElement.dataset.darkTeam = 'true';
  } else if (lum < 0.35) {
    /* Medium-dark color — keep it but force white text on colored buttons */
    css += ':root, body, body[data-custom-colors="true"] {\n';
    css += '  --team-btn-fg: #ffffff;\n';
    css += '  --team-color-rgb: ' + rgb[0] + ', ' + rgb[1] + ', ' + rgb[2] + ';\n';
    css += '}\n';
  } else {
    /* Bright color — black text on colored buttons */
    css += ':root, body, body[data-custom-colors="true"] {\n';
    css += '  --team-btn-fg: #000000;\n';
    css += '  --team-color-rgb: ' + rgb[0] + ', ' + rgb[1] + ', ' + rgb[2] + ';\n';
    css += '}\n';
  }

  if (css) {
    var style = document.createElement('style');
    style.id = 'dc-color-safe';
    style.textContent = css;
    document.head.appendChild(style);
  }
})();
</script>
