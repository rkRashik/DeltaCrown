<div id="ph-lobby" class="hidden-state">
  <div class="rounded-2xl p-7 relative overflow-hidden border ac-bd" style="background:linear-gradient(135deg,rgba(var(--ar),var(--ag),var(--ab),.08),transparent)">
    <div class="absolute right-0 top-0 w-52 h-52 rounded-full pointer-events-none" style="background:rgba(var(--ar),var(--ag),var(--ab),.12);filter:blur(60px)"></div>

    <div id="lobby-host-view" class="relative z-10 flex flex-col lg:flex-row gap-8">
      <div class="flex-1">
        <div class="inline-flex items-center gap-2 px-2.5 py-1 rounded text-[10px] font-black uppercase tracking-widest mb-4 ac ac-bg border ac-bd"><i data-lucide="shield" class="w-3 h-3"></i>Host / Staff Controls</div>
        <h3 class="font-display font-black text-2xl text-white mb-3">Create and Broadcast Lobby Credentials</h3>
        <p class="text-sm text-gray-400 mb-5 leading-relaxed max-w-sm">Use the tournament-approved settings below, then broadcast credentials to both sides.</p>
        <div id="host-steps" class="space-y-2 text-xs text-gray-400 font-mono"></div>
      </div>
      <div class="w-full lg:w-[380px] rounded-2xl p-6 shadow-2xl" style="background:rgba(0,0,0,.7);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1)">
        <h4 class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-4">Broadcast Lobby Credentials</h4>
        <form id="cred-form" class="space-y-3"></form>
        <button id="btn-broadcast-creds" class="w-full py-3 mt-3 rounded-xl font-black uppercase tracking-widest text-sm" style="background:var(--ac);color:#000">Broadcast Credentials</button>
        <button id="btn-start-live" class="w-full py-3 mt-2 rounded-xl bg-white/10 border border-white/15 text-white text-xs font-black uppercase tracking-widest">Mark Match Live</button>
      </div>
    </div>

    <div id="lobby-guest-view" class="hidden-state relative z-10 flex flex-col items-center justify-center text-center py-14">
      <div class="relative w-14 h-14 mb-5">
        <div class="absolute inset-0 rounded-full border-4" style="border-color:rgba(var(--ar),var(--ag),var(--ab),.2)"></div>
        <div class="absolute inset-0 rounded-full border-4 border-t-transparent animate-spin" style="border-color:var(--ac);border-top-color:transparent"></div>
        <div class="absolute inset-2 rounded-full ac-bg flex items-center justify-center"><i data-lucide="shield" class="w-4 h-4 ac"></i></div>
      </div>
      <h3 class="font-display font-black text-2xl text-white mb-2">Awaiting Host Setup</h3>
      <p class="text-sm text-gray-400 max-w-sm">Lobby credentials will appear automatically once host/staff broadcasts them.</p>
    </div>
  </div>
</div>
