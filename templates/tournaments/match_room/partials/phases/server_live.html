<div id="ph-server" class="hidden-state">
  <div class="rounded-2xl p-7 relative overflow-hidden border" style="background:linear-gradient(135deg,rgba(var(--ar),var(--ag),var(--ab),.08),transparent);border-color:rgba(var(--ar),var(--ag),var(--ab),.28)">
    <div class="absolute right-0 top-0 w-56 h-56 rounded-full pointer-events-none" style="background:rgba(var(--ar),var(--ag),var(--ab),.1);filter:blur(70px)"></div>
    <div class="flex flex-col md:flex-row items-start justify-between gap-8 relative z-10">
      <div class="flex-1">
        <div class="inline-flex items-center gap-2 px-2.5 py-1 rounded text-[10px] font-black uppercase tracking-widest mb-3 ac ac-bg"><span class="w-1.5 h-1.5 rounded-full animate-pulse" style="background:var(--ac)"></span>Match Is Live</div>
        <h3 id="server-map-name" class="font-display font-black text-4xl text-white mb-2">Live Lobby</h3>
        <p class="text-sm text-gray-400 mb-4">Join promptly to avoid no-show penalties.</p>
        <div id="server-steps" class="space-y-1.5 text-xs text-gray-400 font-mono"></div>
      </div>
      <div class="w-full md:w-auto flex flex-col gap-3 min-w-[220px]">
        <div id="server-creds" class="glass rounded-xl p-4 flex flex-col gap-3"></div>
        <button id="btn-to-results" class="text-xs text-gray-500 hover:text-white border-b border-dashed border-gray-700 pb-1 transition-colors font-bold uppercase tracking-widest">Match Done -> Submit Result</button>
      </div>
    </div>
  </div>
</div>
