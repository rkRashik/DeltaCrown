<header class="w-full border-b border-white/5 shrink-0 relative overflow-hidden glass-panel">
  <div class="absolute left-0 inset-y-0 w-2/5 pointer-events-none" style="background:linear-gradient(to right,rgba(var(--ar),var(--ag),var(--ab),.09),transparent)"></div>
  <div class="absolute right-0 inset-y-0 w-2/5 pointer-events-none" style="background:linear-gradient(to left,rgba(255,42,85,.09),transparent)"></div>
  <div class="px-5 py-2.5 flex items-center justify-between relative z-10">
    <div class="flex items-center gap-3 flex-1 min-w-0">
      <div id="team-a-logo" class="w-11 h-11 rounded-xl flex items-center justify-center font-display font-black text-base shrink-0" style="background:rgba(var(--ar),var(--ag),var(--ab),.15);border:1.5px solid rgba(var(--ar),var(--ag),var(--ab),.45);color:var(--ac)">A</div>
      <div class="min-w-0">
        <h2 id="team-a-name" class="font-display font-bold text-lg text-white tracking-wide leading-none gradient-text truncate">Team A</h2>
        <p id="team-a-sub" class="text-[9px] font-mono tracking-widest uppercase mt-0.5" style="color:var(--ac)">Your squad</p>
      </div>
    </div>

    <div class="flex flex-col items-center px-3 shrink-0">
      <span id="match-format" class="text-[9px] font-bold text-gray-600 uppercase tracking-widest mb-1">BO1</span>
      <div class="w-9 h-9 rounded-full border border-white/10 flex items-center justify-center font-display font-black text-gray-600 italic text-sm" style="background:#020203">VS</div>
    </div>

    <div class="flex items-center gap-3 flex-1 justify-end text-right min-w-0">
      <div class="min-w-0">
        <h2 id="team-b-name" class="font-display font-bold text-lg text-white tracking-wide leading-none truncate">Team B</h2>
        <p id="team-b-sub" class="text-[9px] text-red-300 font-mono tracking-widest uppercase mt-0.5">Opponent</p>
      </div>
      <div id="team-b-logo" class="w-11 h-11 rounded-xl bg-red-500/20 border border-red-400/40 flex items-center justify-center text-red-300 font-display font-black text-base shrink-0">B</div>
    </div>
  </div>
</header>
