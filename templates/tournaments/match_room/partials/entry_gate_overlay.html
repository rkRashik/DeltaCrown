<div id="entry-gate-overlay" class="entry-gate-overlay is-hidden" aria-live="polite" aria-hidden="true">
  <div class="entry-gate-scrim"></div>
  <div class="entry-gate-panel">
    <div class="flex items-start gap-3">
      <div class="w-10 h-10 rounded-lg ac-bg border ac-bd flex items-center justify-center shrink-0">
        <i data-lucide="shield-check" class="w-4 h-4 ac"></i>
      </div>
      <div class="min-w-0 flex-1">
        <p id="entry-gate-title" class="text-xs font-black uppercase tracking-widest text-white">Ready Check</p>
        <p id="entry-gate-subtext" class="text-[11px] text-gray-300 mt-1">Confirm your side is ready before lobby controls unlock.</p>

        <div class="mt-3">
          <span id="entry-gate-checkin-pill" class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded text-[10px] font-black uppercase tracking-widest border border-white/15 bg-white/5 text-gray-200">Ready Gate</span>
          <p id="entry-gate-checkin-text" class="text-[11px] text-gray-300 mt-2">Status details will appear here.</p>
        </div>

        <div class="mt-4 flex flex-wrap items-center gap-2">
          <button id="entry-gate-primary-btn" class="px-4 py-2 rounded-lg font-black text-[10px] uppercase tracking-widest" style="background:var(--ac);color:#000">Enter Lobby</button>
          <button id="entry-gate-secondary-btn" class="px-3 py-2 rounded-lg border border-white/15 bg-white/5 text-[10px] font-black uppercase tracking-widest text-gray-200 hover:bg-white/10 transition-colors">Continue Read-Only</button>
        </div>
      </div>
    </div>
  </div>
</div>
