{% load static %}
<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0a0a0f">
  <title>{% block title %}DeltaCrown{% endblock %}</title>

  <!-- Favicon -->
  <link rel="icon" href="{% static 'img/favicon/favicon.ico' %}?v=new" sizes="any">
  <link rel="apple-touch-icon" href="{% static 'img/favicon/favicon-180x180.png' %}?v=new">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&family=Rajdhani:wght@500;600;700;800&display=swap" rel="stylesheet">

  <!-- Compiled Tailwind (production-safe — NO CDN dependency) -->
  <link rel="stylesheet" href="{% static 'dist/tailwind.css' %}?v=20260225">

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- CSRF -->
  <meta name="csrf-token" content="{{ csrf_token }}">

  <style>
    /* ─── Draw System Design Tokens ─── */
    :root {
      --dc-accent: #00ffaa;
      --dc-accent-rgb: 0,255,170;
      --dc-gold: #ffc832;
      --dc-gold-rgb: 255,200,50;
      --dc-danger: #ff4444;
      --dc-danger-rgb: 255,68,68;
      --dc-blue: #4da6ff;
      --dc-bg: #0a0a0f;
      --dc-surface: #0f0f1a;
      --dc-card: #10101c;
      --dc-border: rgba(255,255,255,0.06);
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--dc-bg);
      color: rgba(255,255,255,0.9);
      font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      overflow-x: hidden;
    }
    .font-display { font-family: 'Space Grotesk', sans-serif; }
    .font-gaming { font-family: 'Rajdhani', sans-serif; }
  </style>

  {% block draw_head %}{% endblock %}
</head>
<body>
  {% block draw_body %}{% endblock %}

  <script nonce="{{ request.csp_nonce }}">
    document.addEventListener('DOMContentLoaded', function() {
      if (typeof lucide !== 'undefined') lucide.createIcons();
    });
  </script>
  {% block draw_js %}{% endblock %}
</body>
</html>
