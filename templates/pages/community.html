{% extends 'base.html' %}
{% load static %}

{% block title %}Community — DeltaCrown{% endblock %}

{% block extra_head %}
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com" nonce="{{ request.csp_nonce }}"></script>
  <script nonce="{{ request.csp_nonce }}">
    tailwind.config = {
      theme: { extend: {
        colors: {
          dc: {
            base: '#050510', ink: '#0a0a15', surface: '#0e0e1c', panel: '#13131f',
            line: 'rgba(255,255,255,0.07)', cyan: '#00E5FF', violet: '#7B2BFF',
            gold: '#FFD166', emerald: '#10E68B', rose: '#FF4D6D',
          },
        },
        fontFamily: {
          sans: ['Inter','ui-sans-serif','system-ui','sans-serif'],
          display: ['"Space Grotesk"','sans-serif'],
          hud: ['Rajdhani','sans-serif'],
          mono: ['"JetBrains Mono"','ui-monospace','monospace'],
        },
      }}
    };
  </script>

  <link rel="stylesheet" href="{% static 'community/styles.css' %}?v=2026-05-21f">

  <style nonce="{{ request.csp_nonce }}">
    /* ══════════════════════════════════════════════════════════════
       ROOT CAUSE FIX: static/community/styles.css sets
         html, body { height: 100%; }
       which constrains body to 100vh. Content below the fold is
       painted by <html> which still has var(--bg)=#0b0f16 from
       tokens.css — so the "old" bg shows when scrolling.
       Fix: reset heights to auto/min-height and force html colour.
    ═══════════════════════════════════════════════════════════════ */
    html { background: #050510 !important; }
    body.dc-community-page { height: auto !important; min-height: 100vh; background: #050510 !important; }

    /* ── Aurora / BG variants via a position:fixed backdrop div
       so it ALWAYS covers the viewport regardless of scroll.
       React updates #dc-comm-bg[data-bg] on tweak change. ── */
    #dc-comm-bg {
      position: fixed; inset: 0; z-index: -1; pointer-events: none;
      background: #050510;
    }
    #dc-comm-bg:not([data-bg]),
    #dc-comm-bg[data-bg="aurora"] {
      background-image:
        radial-gradient(1100px 700px at 12% -10%, rgba(108,0,255,0.12), transparent 60%),
        radial-gradient(900px 600px at 95% 10%,  rgba(0,229,255,0.08), transparent 60%),
        radial-gradient(800px 500px at 80% 110%, rgba(108,0,255,0.07), transparent 60%);
    }
    #dc-comm-bg[data-bg="noir"] {
      background-image: radial-gradient(1200px 600px at 50% -20%, rgba(0,229,255,0.05), transparent 60%);
    }
    #dc-comm-bg[data-bg="grid"] {
      background-color: #030309;
      background-image:
        radial-gradient(900px 500px at 50% 0%, rgba(0,229,255,0.10), transparent 65%),
        linear-gradient(rgba(255,255,255,0.022) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.022) 1px, transparent 1px);
      background-size: 100% 100%, 36px 36px, 36px 36px;
    }
    #dc-comm-bg[data-bg="mesh"] {
      background-image:
        radial-gradient(ellipse 800px 500px at 15% 25%, rgba(108,0,255,0.22), transparent 60%),
        radial-gradient(ellipse 700px 400px at 85% 55%, rgba(0,229,255,0.20), transparent 60%),
        radial-gradient(ellipse 900px 600px at 50% 95%, rgba(108,0,255,0.14), transparent 60%);
    }
    #dc-comm-bg[data-bg="hex"] {
      background-color: #030309;
      background-image:
        radial-gradient(900px 500px at 50% 0%, rgba(0,229,255,0.10), transparent 65%),
        radial-gradient(circle at 50% 50%, rgba(255,255,255,0.025) 1px, transparent 1.2px);
      background-size: 100% 100%, 22px 22px;
    }

    /* ── Modal: must sit above Django nav (z-[100]). ── */
    .dc-modal-backdrop { z-index: 220 !important; }

    /* ── Rails sticky below the 80px nav ── */
    .dc-rail-sticky {
      top: calc(80px + 1rem) !important;
      max-height: calc(100vh - 80px - 2rem) !important;
    }

    /* ── Nav: dark glass, no bottom border (tabs extend it visually) ── */
    body.dc-community-page #dc-navbar {
      transition: transform 0.3s cubic-bezier(.4,0,.2,1);
      background: rgba(5, 5, 16, 0.92) !important;
      backdrop-filter: blur(20px) saturate(160%) !important;
      border-bottom: 1px solid rgba(255,255,255,0.04) !important;
    }
    body.dc-community-page #dc-navbar.nav-hidden { transform: translateY(-100%); }

    /* ── FeedTabs sticky: same dark glass as the nav so they read as one unit ── */
    body.dc-community-page .dc-glass-strong {
      background: rgba(5, 5, 16, 0.96) !important;
      border-left: none !important;
      border-right: none !important;
      border-top: none !important;
      border-bottom: 1px solid rgba(255,255,255,0.06) !important;
    }

    /* ── Community icon nav links ── */
    .dc-ci {
      display: flex; align-items: center; justify-content: center;
      width: 40px; height: 40px; border-radius: 10px; flex-shrink: 0;
      color: rgba(255,255,255,0.48); font-size: 1rem;
      transition: all 0.15s; position: relative; text-decoration: none;
    }
    .dc-ci:hover { color: white; background: rgba(255,255,255,0.06); }
    .dc-ci.is-active { color: #00E5FF; background: rgba(0,229,255,0.08); }
    .dc-ci.is-active::after {
      content: '';
      position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%);
      width: 24px; height: 2.5px; border-radius: 2px;
      background: linear-gradient(90deg,#00E5FF,#7B2BFF);
      box-shadow: 0 0 8px rgba(0,229,255,0.5);
    }

    /* ── Community search ── */
    #dc-community-search-input::placeholder { color: rgba(255,255,255,0.3); }
    #dc-community-search-input { color: white; }
    #dc-community-search-input::-webkit-search-cancel-button { display: none; }
  </style>
{% endblock %}

{% block content %}
  <div id="dc-comm-bg" data-bg="aurora" aria-hidden="true"></div>
  <div id="dc-community-root"></div>
{% endblock %}

{% block extra_js %}
  <script id="dc-community-config" type="application/json">
    {
      "isAuthenticated": {{ request.user.is_authenticated|yesno:"true,false" }},
      "csrfToken": "{{ csrf_token|escapejs }}",
      "me": {% if request.user.is_authenticated %}{
        "id": "u-self",
        "name": "{{ request.user.get_full_name|default:request.user.username|escapejs }}",
        "handle": "{{ request.user.username|escapejs }}",
        "color1": "#7B2BFF", "color2": "#00E5FF",
        "verified": {{ request.user.is_staff|yesno:"true,false" }},
        "country": "🇧🇩",
        "avatar_url": "{{ dc_me_avatar|default:''|escapejs }}"
      }{% else %}null{% endif %},
      "urls": {
        "sidebar":       "{% url 'siteui:community_api_sidebar' %}",
        "feed":          "{% url 'siteui:community_api_feed' %}",
        "createPost":    "{% url 'siteui:community_api_create_post' %}",
        "userTeams":     "{% url 'siteui:community_api_user_teams' %}",
        "preferences":   "{% url 'siteui:community_api_preferences' %}",
        "like":          "{% url 'siteui:community_api_like' post_id=0 %}",
        "comments":      "{% url 'siteui:community_api_comments' post_id=0 %}",
        "vote":          "{% url 'siteui:community_api_poll_vote' post_id=0 %}",
        "myTournaments": "{% url 'siteui:community_api_my_tournaments' %}",
        "myPassports":   "{% url 'siteui:community_api_my_passports' %}"
      }
    }
  </script>

  <script nonce="{{ request.csp_nonce }}">
    (function () {
      /* Parse config */
      var cfg = document.getElementById('dc-community-config');
      try { window.DC_CONFIG = JSON.parse(cfg.textContent); }
      catch (e) { window.DC_CONFIG = { isAuthenticated: false, urls: {} }; }

      /* Apply body class + data-bg immediately so background shows before React */
      document.body.classList.add('dc-community-page');
      document.body.setAttribute('data-bg', 'aurora');
      var bgDiv = document.getElementById('dc-comm-bg');
      if (bgDiv) bgDiv.setAttribute('data-bg', 'aurora');

      /* Bridge: Django nav search input → React */
      function wireSearch() {
        var input = document.getElementById('dc-community-search-input');
        if (!input) return;
        input.addEventListener('input', function () {
          window.dispatchEvent(new CustomEvent('dc-community-search', { detail: input.value }));
        });
      }

      /* Bridge: Django nav "Post" button → React composer modal.
         Tries window.dcCommunityCompose (set by React after mount), falls back to event. */
      function wirePostBtn() {
        var btn = document.getElementById('dc-community-post-btn');
        if (!btn) return;
        btn.addEventListener('click', function () {
          if (typeof window.dcCommunityCompose === 'function') {
            window.dcCommunityCompose('text');
          } else {
            window.dispatchEvent(new CustomEvent('dc-community-compose', { detail: 'text' }));
          }
        });
      }

      /* Scroll-hide the nav */
      function wireScrollHide() {
        var nav = document.getElementById('dc-navbar');
        if (!nav) return;
        var lastY = 0, ticking = false;
        window.addEventListener('scroll', function () {
          if (ticking) return;
          ticking = true;
          requestAnimationFrame(function () {
            var y = window.scrollY || window.pageYOffset;
            nav.classList.toggle('nav-hidden', y > lastY && y > 120);
            if (y < lastY) nav.classList.remove('nav-hidden');
            lastY = y;
            ticking = false;
          });
        }, { passive: true });
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', function () {
          wireSearch(); wirePostBtn(); wireScrollHide();
        });
      } else {
        wireSearch(); wirePostBtn(); wireScrollHide();
      }
    })();
  </script>

  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous" nonce="{{ request.csp_nonce }}"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous" nonce="{{ request.csp_nonce }}"></script>

  <script src="{% static 'community/build/data.js' %}?v=2026-05-21f" nonce="{{ request.csp_nonce }}"></script>
  <script src="{% static 'community/build/cards.js' %}?v=2026-05-21f" nonce="{{ request.csp_nonce }}"></script>
  <script src="{% static 'community/build/rails.js' %}?v=2026-05-21f" nonce="{{ request.csp_nonce }}"></script>
  <script src="{% static 'community/build/composer.js' %}?v=2026-05-21f" nonce="{{ request.csp_nonce }}"></script>
  <script src="{% static 'community/build/tweaks-panel.js' %}?v=2026-05-21f" nonce="{{ request.csp_nonce }}"></script>
  <script src="{% static 'community/build/app.js' %}?v=2026-05-21f" nonce="{{ request.csp_nonce }}"></script>
{% endblock %}
